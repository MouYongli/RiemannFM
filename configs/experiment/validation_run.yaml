# @package _global_
# Phase 1: Validation run — confirm training dynamics on full data.
# Target: wikidata_5m + base model, ~18h on 1x H100.
# Pass criteria: multi-t val stable, loss components balanced, curvature evolving.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128

flow:
  time_distribution: logit_normal

training:
  max_steps: 10000
  warmup_steps: 2000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 3.0e-6
  curvature_lr: 1.0e-6
  weight_decay: 0.001
  temperature: 0.15
  mu_align: 1.0
