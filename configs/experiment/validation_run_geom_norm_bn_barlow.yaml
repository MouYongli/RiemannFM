# @package _global_
# Phase 1 variant: validation_run_geom_norm_barlow + terminal BN1d on
# align projectors.  Pair config with validation_run_geom_norm_bn.yaml.
#
# validation_run_geom_norm_barlow showed L_align min 45.2 (vs bar0's
# 102.4) but 52% up-moves in the trajectory, essentially unchanged
# oscillation rate.  Final-ckpt diagnostic: g_self = 0.86, c_self = 0.83
# — projector collapse drives both the deep-but-noisy L_align and the
# /std instability in Barlow's in-loss standardisation.
#
# Hypothesis: BatchNorm1d at projector tail eliminates the degenerate
# output dim → Barlow's /(std + eps) stops dividing by near-eps → the
# 52% up-move rate should drop toward monotone descent, and final
# L_align should improve further than the current 45.2 min.
#
# A/B with validation_run_geom_norm_bn.yaml isolates BN's effect on
# Barlow vs InfoNCE.  Expected outcomes:
#   - BN helps Barlow more than InfoNCE → BN specifically fixes /std
#   - BN helps both equally → general projector rank-1 fix
#   - BN helps neither → collapse is deeper in the backbone, not proj
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_geom_norm_bn_barlow_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128
  rwpe_k: 8

flow:
  time_distribution: logit_normal

model:
  text_proj_dim: 64
  align_proj_dim: 256
  align_proj_depth: 3
  align_proj_bn: true
  pe_dim: 8

training:
  max_steps: 10000
  warmup_steps: 1000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 1.0e-5
  curvature_lr: 5.0e-6
  align_lr: 1.0e-4
  lr_min_ratio: 0.1
  weight_decay: 0.001
  temperature: 0.1
  mask_c_temperature: 0.07
  mu_align: 1.0
  nu_mask_c: 1.0
  nu_mask_x: 1.0
  mask_ratio_c: 0.15
  mask_ratio_x: 0.05
  edge_loss_mode: softmax_ce
  align_loss_mode: barlow
  barlow_lambda_off: 5.0e-3
