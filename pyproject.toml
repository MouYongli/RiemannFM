[project]
name = "riedfm-g"
version = "0.1.0"
description = "Riemannian Discrete Flow Matching on Graphs - A Deep Graph Generative Foundation Model"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
authors = [
    {name = "Yongli Mou"},
]
dependencies = [
    "torch>=2.6.0",
    "torch_geometric>=2.6.0",
    "geoopt>=0.5.0",
    "torchdiffeq>=0.2.4",
    "transformers>=4.48.0",
    "datasets>=3.2.0",
    "hydra-core>=1.3.2",
    "omegaconf>=2.3.0",
    "wandb>=0.19.0",
    "einops>=0.8.0",
    "scipy>=1.14.0",
    "scikit-learn>=1.6.0",
    "networkx>=3.4",
    "pandas>=2.2.0",
    "tqdm>=4.67.0",
    "rich>=13.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-cov>=6.0.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["setuptools>=75.0", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
include = ["riedfm*"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
