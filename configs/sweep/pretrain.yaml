sampler: tpe
n_trials: 15
direction: minimize
objective: val_loss

search_space:
  training.lr:
    type: categorical
    choices: [5.0e-5, 1.0e-4, 3.0e-4, 5.0e-4]
  training.curvature_lr:
    type: categorical
    choices: [1.0e-6, 5.0e-6, 1.0e-5, 5.0e-5]
  training.warmup_steps:
    type: categorical
    choices: [2000, 4000, 8000]
  training.lambda_disc:
    type: categorical
    choices: [0.1, 0.5, 1.0, 2.0]
  training.mu_align:
    type: categorical
    choices: [0.01, 0.05, 0.1, 0.5]
  training.temperature:
    type: categorical
    choices: [0.05, 0.07, 0.1, 0.2]
  training.weight_decay:
    type: categorical
    choices: [0.01, 0.05, 0.1]
  data.max_nodes:
    type: categorical
    choices: [32, 64, 128]
