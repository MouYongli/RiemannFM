# @package _global_
# E3: Architecture ablation — remove one component at a time.
# 8 variants × ~2 days each on small model (1x H100).
defaults:
  - override /model: small
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: abl_arch_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128

training:
  max_steps: 50000
  warmup_steps: 1000
  val_check_interval: 2000
  batch_size: 4
  gradient_accumulation_steps: 8

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      ablation: full,no_geok,no_a_r,no_c,no_d_vr,no_d_ve,no_e_v,no_e_r
