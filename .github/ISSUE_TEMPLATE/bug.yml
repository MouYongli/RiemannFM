name: Bug Report
description: Report a bug or unexpected behavior
labels: ["type:bug", "priority:high"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, PyTorch version, GPU, CUDA version
      value: |
        - OS:
        - Python: 3.12
        - PyTorch:
        - GPU:
        - CUDA:
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect? What actually happened?
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: Any ideas about the root cause?
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Module Scope
      description: Which module(s) does this affect?
      multiple: true
      options:
        - manifolds
        - flow
        - models
        - layers
        - data
        - losses
        - utils
        - cli
        - configs
    validations:
      required: false
