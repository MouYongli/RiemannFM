# @package _global_
# Phase 1 variant: validation_run with encoder-side geometric DC removal.
#
# Applied structurally in the model (not gated by a Hydra flag):
#   - Drop Lorentz x_0 at encoder input (2f86402).
#   - Block-wise LayerNorm on S and E at encoder input (0fb6b43).
#   - Inject κ_h, κ_s into ATH-Norm via FiLM (d11f47b).
# These remove the rank-1 DC mode that pinned L_align near log(M) and
# caused Barlow's L_align to oscillate in validation_run_barlow.
#
# Mean-centering of proj_g / proj_c / proj_mask_c is retained as a
# double-guard; once DC is cut at source it should become redundant.
#
# Success criteria (end of run, train-side):
#   L_align < 4.2 (was 4.84), g_self_cos < 0.5 (was 0.92),
#   σ_1/σ_2 of g_proj < 2.0 (was 5.5), no regression in L_cont / L_mask_x.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_geom_norm_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128
  rwpe_k: 8

flow:
  time_distribution: logit_normal

model:
  text_proj_dim: 64
  align_proj_dim: 256
  align_proj_depth: 3
  pe_dim: 8

training:
  max_steps: 10000
  warmup_steps: 1000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 1.0e-5
  curvature_lr: 5.0e-6
  align_lr: 1.0e-4
  lr_min_ratio: 0.1
  weight_decay: 0.001
  temperature: 0.1
  mask_c_temperature: 0.07
  mu_align: 1.0
  nu_mask_c: 1.0
  nu_mask_x: 1.0
  mask_ratio_c: 0.15
  mask_ratio_x: 0.05
  edge_loss_mode: softmax_ce
