# @package _global_
# Phase 1: Validation run — confirm training dynamics on full data.
# Target: wikidata_5m + base model, ~18h on 1× H100.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128
  rwpe_k: 8

flow:
  time_distribution: logit_normal
  edge_schedule: cosine

model:
  text_proj_dim: 64
  pe_dim: 8

training:
  max_steps: 10000
  warmup_steps: 2000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 5.0e-5
  curvature_lr: 2.5e-5
  relation_lr: 1.67e-5
  lr_min_ratio: 0.1
  weight_decay: 0.01
  lambda_X: 1.0
  lambda_ex: 1.0
  lambda_ty: 0.5
  lambda_align_R: 0.02
  modality_mask:
    p_full: 0.80
    p_tm: 0.10
    p_cm: 0.10
