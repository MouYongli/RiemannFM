_target_: riemannfm.models.lightning_module.RiemannFMPretrainModule

# Use max_steps (not epochs) — subgraph sampling is an infinite data stream.
max_steps: 500000
val_check_interval: 10000

batch_size: 8
gradient_accumulation_steps: 8
lr: 1.0e-4
curvature_lr: 1.0e-4
align_lr: 1.0e-4
weight_decay: 0.01
warmup_steps: 10000
max_grad_norm: 1.0
mixed_precision: bf16
# Cosine decay floor: final LR = peak × lr_min_ratio (0 = decay to zero,
# 0.1 keeps 10% of peak so the tail of training retains learning signal).
lr_min_ratio: 0.0

# Loss weights
lambda_disc: 10.0
mu_align: 0.5
nu_mask_c: 1.0          # semantic masked-node identification (L_mask_c)
nu_mask_x: 1.0          # geometric masked-node reconstruction (L_mask_x)
temperature: 0.07
mask_c_temperature: 0.07
neg_ratio: 1.0
# L_disc formulation: "bce" (per-channel, multi-hot compatible) or
# "softmax_ce" (K-way CE on positive pairs + zero-BCE on negatives).
# softmax_ce removes the 1/K channel dilution; use on single-hot KGs
# (wikidata_5m has 0% multi-hot pairs).
edge_loss_mode: bce
max_align_nodes: 128

# Node-partition mask ratios (Def 6.9a).  Disjoint; REAL anchors get the
# remainder.  M_c: text ← mask_emb, geometry kept (t=1).
#                  M_x: geometry ← noise at t=0, text kept.
mask_ratio_c: 0.15
mask_ratio_x: 0.05

# Optimization
use_riemannian_optim: true

# Validation
limit_val_batches: 8
