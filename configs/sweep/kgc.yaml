sampler: tpe
n_trials: 20
direction: maximize
objective: val_mrr

search_space:
  training.lr:
    type: categorical
    choices: [5.0e-5, 1.0e-4, 3.0e-4]
  task.lambda_kgc:
    type: categorical
    choices: [0.5, 1.0, 2.0]
  task.mask_prob_edge:
    type: categorical
    choices: [0.1, 0.2, 0.3]
  task.mask_prob_node:
    type: categorical
    choices: [0.0, 0.05, 0.1, 0.2]
