# @package _global_
# Phase 1 variant: validation_run_geom_norm + terminal BatchNorm1d on
# align projectors (proj_g / proj_c).
#
# Final-ckpt diagnostic on validation_run_geom_norm at step 9999 showed
# proj_g output rank-1 collapse (g_self = 0.78, sigma_1/sigma_2 = 4.67)
# despite clean backbone h (self-cos 0.47).  The projector itself is
# the collapse source, not the encoder input.
#
# Hypothesis: BatchNorm1d(d_a, affine=False) at proj tail forces every
# output dim to unit batch variance, eliminating the degenerate dim
# that compresses all tokens onto a shared direction.  Expected result:
# g_self drops from 0.78 to < 0.4, L_align continues descending below
# the validation_run_geom_norm final value of 4.0.
#
# Same recipe as validation_run_geom_norm otherwise.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_geom_norm_bn_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128
  rwpe_k: 8

flow:
  time_distribution: logit_normal

model:
  text_proj_dim: 64
  align_proj_dim: 256
  align_proj_depth: 3
  align_proj_bn: true
  pe_dim: 8

training:
  max_steps: 10000
  warmup_steps: 1000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 1.0e-5
  curvature_lr: 5.0e-6
  align_lr: 1.0e-4
  lr_min_ratio: 0.1
  weight_decay: 0.001
  temperature: 0.1
  mask_c_temperature: 0.07
  mu_align: 1.0
  nu_mask_c: 1.0
  nu_mask_x: 1.0
  mask_ratio_c: 0.15
  mask_ratio_x: 0.05
  edge_loss_mode: softmax_ce
