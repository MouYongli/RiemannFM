sampler: tpe
n_trials: 20
direction: maximize
objective: val_relation_f1

search_space:
  training.lr:
    type: categorical
    choices: [5.0e-5, 1.0e-4, 3.0e-4]
  task.lambda_t2g:
    type: categorical
    choices: [0.5, 1.0, 2.0]
  task.mu_t2g:
    type: categorical
    choices: [0.01, 0.1, 0.5]
  task.num_inference_steps:
    type: categorical
    choices: [50, 100, 200, 500]
