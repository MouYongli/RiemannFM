# @package _global_
# Phase 1: Validation run — confirm training dynamics on full data.
# Target: wikidata_5m + base model, ~18h on 1x H100.
# Pass criteria: multi-t val stable, loss components balanced, curvature evolving.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: validation_run_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128
  rwpe_k: 8

flow:
  time_distribution: logit_normal

model:
  text_proj_dim: 64
  pe_dim: 8

training:
  max_steps: 10000
  warmup_steps: 1000
  val_check_interval: 500
  batch_size: 8
  gradient_accumulation_steps: 8
  lr: 1.0e-5
  curvature_lr: 5.0e-6
  align_lr: 1.0e-4
  lr_min_ratio: 0.1
  weight_decay: 0.001
  temperature: 0.05
  mask_c_temperature: 0.07
  mu_align: 1.0
  nu_mask_c: 1.0
  nu_mask_x: 1.0
  mask_ratio_c: 0.15
  mask_ratio_x: 0.05
  # wikidata_5m is 100% single-hot; softmax_ce removes the K≈822 channel
  # dilution that pins L_disc near zero under per-channel BCE.
  edge_loss_mode: softmax_ce
