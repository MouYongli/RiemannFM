# @package _global_
# E4: Flow ablation — joint vs continuous-only vs discrete-only.
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: ablation_loss_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128

training:
  batch_size: 4
  gradient_accumulation_steps: 8

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      flow: joint,continuous_only,discrete_only
