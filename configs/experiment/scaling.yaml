# @package _global_
# E5: Scaling — small / base / large at same step budget.
# 3 sizes: small ~2d, base ~3.5d, large ~5.5d (1x H100).
defaults:
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: scaling_${model.node_dim}_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128

training:
  max_steps: 100000
  warmup_steps: 2000
  val_check_interval: 2000
  batch_size: 4
  gradient_accumulation_steps: 8

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      model: small,base,large
