_target_: riemannfm.models.lightning_module.RiemannFMPretrainModule

# Use max_steps (not epochs) — subgraph sampling is an infinite data stream.
max_steps: 500000
val_check_interval: 10000

batch_size: 8
gradient_accumulation_steps: 8
lr: 1.0e-4
curvature_lr: 1.0e-5
weight_decay: 0.01
warmup_steps: 10000
max_grad_norm: 1.0
mixed_precision: bf16

# Loss weights
lambda_disc: 1.0
mu_align: 0.1
temperature: 0.07
w_max: 10.0

# Optimization
use_riemannian_optim: true

# Validation
limit_val_batches: 8
