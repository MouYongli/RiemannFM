# @package _global_
# E2: Manifold ablation — product vs single/dual manifolds vs fixed curvature.
# 7 variants × ~2 days each on small model (1x H100).
defaults:
  - override /model: small
  - override /data: wikidata_5m
  - override /training: pretrain
  - _self_

seed: 42
run_name: abl_mfld_${manifold._target_:_}_${now:%Y%m%d_%H%M%S}

data:
  max_nodes: 128

training:
  max_steps: 50000
  warmup_steps: 1000
  val_check_interval: 2000
  batch_size: 4
  gradient_accumulation_steps: 8

hydra:
  mode: MULTIRUN
  sweeper:
    params:
      manifold: h_only,s_only,e_only,h_e,s_e,product_h_s_e,fixed_curvature
