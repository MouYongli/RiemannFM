# Stage 2: fine-tune lr on base model — loss weights locked from stage 1.
# Run with: experiment=pretrain_search_base sweep=pretrain_base --multirun
# Multi-GPU: launch on multiple GPUs with same study_name.
sampler: tpe
n_trials: 6
direction: minimize
objective: val_loss
study_name: hp_search_s2
storage: sqlite:///hp_search_s2.db

search_space:
  training.lr:
    type: categorical
    choices: [3.0e-5, 5.0e-5, 1.0e-4, 1.5e-4]
  training.warmup_steps:
    type: categorical
    choices: [500, 1000, 2000]
  training.weight_decay:
    type: categorical
    choices: [0.01, 0.05]
